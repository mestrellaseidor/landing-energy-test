sitemaps:
  default:
    default: es
    lastmod: YYYY-MM-DD
    languages:
      es:
        source: /es/query-index.json
        destination: /es/sitemap.xml
        hreflang: es-ES
        alternate: /es/{path}
      en:
        source: /en/query-index.json
        destination: /en/sitemap.xml
        hreflang: en-GB
        alternate: /en/{path}
      pt:
        source: /pt/query-index.json
        destination: /pt/sitemap.xml
        hreflang: pt-PT
        alternate: /pt/{path}
